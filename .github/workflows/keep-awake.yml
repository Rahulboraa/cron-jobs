name: keep-awake

on:
  schedule:
    # Every 10 minutes (UTC). GitHub may delay scheduled runs under load.
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Ping every enabled service now, ignoring its interval"
        type: boolean
        default: true

# Allow this workflow to commit the updated status files back to the repo.
permissions:
  contents: write

# Don't let a slow run overlap the next scheduled one.
concurrency:
  group: keep-awake
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ping services
        env:
          CRON_SCHEDULE: "*/10 * * * *"
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
        run: node scripts/ping.mjs

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/status.json data/history.json
          if git diff --staged --quiet; then
            echo "No status changes to commit."
            exit 0
          fi
          git commit -m "chore: update keep-alive status [skip ci]"

          # A concurrent push (e.g. a manual edit) can move the branch ahead of us
          # between checkout and push. Rebase onto the latest remote and retry so the
          # run self-heals instead of failing red. Our data files always win on conflict.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto origin/${GITHUB_REF_NAME} and retrying."
            git pull --rebase -X ours origin "${GITHUB_REF_NAME}"
          done
          echo "::error::Failed to push status update after 5 attempts."
          exit 1
